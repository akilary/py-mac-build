name: Build App for macOS

on:
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Установка Chromium для упаковки в бандл
        run: |
          PLAYWRIGHT_BROWSERS_PATH=./playwright_browsers python -m playwright install chromium

      - name: Сборка через PyInstaller
        run: |
          pyinstaller \
            --onedir \
            --windowed \
            --name "MobileProfiles" \
            --collect-all playwright \
            --hidden-import tkinter \
            --hidden-import _tkinter \
            --osx-bundle-identifier "com.mobileprofiles.app" \
            main.py

      - name: Устанавливаем Chromium рядом с .app
        run: |
          PLAYWRIGHT_BROWSERS_PATH=dist/playwright_browsers \
            python -m playwright install chromium

      - name: Снятие карантина
        run: |
          xattr -cr dist/MobileProfiles.app
          xattr -cr dist/playwright_browsers
          codesign --sign - --force --deep dist/MobileProfiles.app

      - name: Архивируем .app и браузер вместе
        run: |
          cd dist
          zip -r MobileProfiles-macOS.zip MobileProfiles.app playwright_browsers

      - name: Установка rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      - name: Создание credentials
        run: |
          cat > service-account.json << 'EOF'
          ${{ secrets.GDRIVE_CREDENTIALS }}
          EOF

      - name: Настройка rclone
        run: |
          mkdir -p ~/.config/rclone

          cat > ~/.config/rclone/rclone.conf << EOF
          [gdrive]
          type = drive
          scope = drive
          service_account_file = ${{ github.workspace }}/service-account.json
          EOF

      - name: Загрузка ZIP на Google Drive
        run: |
          rclone copy \
            dist/MobileProfiles-macOS.zip \
            gdrive: \
            --drive-root-folder-id 1CWHlRP_0YsuE8ErLfL1e1OpJamrqTO8i

      - name: Загружаем артефакт
        uses: actions/upload-artifact@v4
        with:
          name: MobileProfiles-macOS
          path: dist/MobileProfiles-macOS.zip
          retention-days: 7