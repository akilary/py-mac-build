name: Build App for macOS

on:
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
    - name: Проверяем репозиторий (скачиваем код)
      uses: actions/checkout@v4

    - name: Устанавливаем Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: Устанавливаем зависимости из requirements.txt и PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Собираем файл через PyInstaller
      run: |
       pyinstaller --onefile --windowed main.py

    - name: Загружаем готовый файл в GitHub (чтобы вы могли его скачать)
      uses: actions/upload-artifact@v4
      with:
        name: macos-app
        path: dist/