name: Build App for macOS

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Установка Chromium для упаковки в бандл
        run: |
          PLAYWRIGHT_BROWSERS_PATH=./playwright_browsers python -m playwright install chromium

      - name: Сборка через PyInstaller
        run: |
          pyinstaller \
            --onedir \
            --windowed \
            --name "MobileProfiles" \
            --collect-all playwright \
            --hidden-import tkinter \
            --hidden-import _tkinter \
            --osx-bundle-identifier "com.mobileprofiles.app" \
            main.py

      - name: Устанавливаем Chromium рядом с .app
        run: |
          PLAYWRIGHT_BROWSERS_PATH=dist/playwright_browsers \
            python -m playwright install chromium

      - name: Снятие карантина
        run: |
          xattr -cr dist/MobileProfiles.app
          xattr -cr dist/playwright_browsers
          codesign --sign - --force --deep dist/MobileProfiles.app

      - name: Архивируем .app и браузер вместе
        run: |
          cd dist
          zip -r MobileProfiles-macOS.zip MobileProfiles.app playwright_browsers

      - name: Загружаем артефакт
        uses: actions/upload-artifact@v4
        with:
          name: MobileProfiles-macOS
          path: dist/MobileProfiles-macOS.zip
          retention-days: 7

      - name: Создать тег релиза
        id: tag
        run: |
          echo "tag=build-${GITHUB_RUN_NUMBER}" >> $GITHUB_OUTPUT

      - name: Создать GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: macOS Build #${{ github.run_number }}
          files: dist/MobileProfiles-macOS.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}